openapi: 3.0.3
info:
  title: Donegeon Todoist API
  description: Hono-based API server for task management using Todoist v1 API
  version: 1.0.0
  contact:
    name: Donegeon
    url: https://github.com/donegeon

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.donegeon.com
    description: Production server

security:
  - bearerAuth: []

paths:
  # Health Check
  /healthz:
    get:
      summary: Health check endpoint
      description: Check if the API server is running
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time

  # Version
  /api/version:
    get:
      summary: Get API version
      description: Returns the current API version
      responses:
        '200':
          description: API version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "1.0.0"
                  api_version:
                    type: string
                    example: "v1"

  # User
  /api/user:
    get:
      summary: Get current user
      description: Get information about the authenticated user
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Tasks
  /api/tasks:
    get:
      summary: Get tasks
      description: Get all active tasks with optional filtering and pagination
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: section_id
          in: query
          schema:
            type: string
          description: Filter by section ID
        - name: parent_id
          in: query
          schema:
            type: string
          description: Filter by parent task ID
        - name: label
          in: query
          schema:
            type: string
          description: Filter by label name
        - name: ids
          in: query
          schema:
            type: string
          description: Comma-separated list of task IDs
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTasks'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create task
      description: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/tasks/quick:
    post:
      summary: Quick add task
      description: Create a task using natural language parsing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickAddTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                description: Quick add response
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/filter:
    get:
      summary: Get tasks by filter
      description: Get tasks matching a filter query
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 1024
          description: Filter query string
        - name: lang
          in: query
          schema:
            type: string
            enum: [en, da, pl, zh, ko, de, pt, ja, it, fr, sv, ru, es, nl, fi, nb, tw]
          description: Query language
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Filtered tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTasks'

  /api/tasks/completed/by_completion_date:
    get:
      summary: Get completed tasks by completion date
      description: Get completed tasks within a date range
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Start date (ISO 8601)
        - name: until
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: End date (ISO 8601)
        - name: workspace_id
          in: query
          schema:
            type: string
        - name: project_id
          in: query
          schema:
            type: string
        - name: section_id
          in: query
          schema:
            type: string
        - name: parent_id
          in: query
          schema:
            type: string
        - name: filter_query
          in: query
          schema:
            type: string
        - name: filter_lang
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Completed tasks by completion date
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  next_cursor:
                    type: string

  /api/tasks/completed/by_due_date:
    get:
      summary: Get completed tasks by due date
      description: Get completed tasks by their original due date
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: workspace_id
          in: query
          schema:
            type: string
        - name: project_id
          in: query
          schema:
            type: string
        - name: section_id
          in: query
          schema:
            type: string
        - name: parent_id
          in: query
          schema:
            type: string
        - name: filter_query
          in: query
          schema:
            type: string
        - name: filter_lang
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Completed tasks by due date
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  next_cursor:
                    type: string

  /api/tasks/{task_id}:
    get:
      summary: Get task
      description: Get a single task by ID
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
        - name: public_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Update task
      description: Update an existing task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete task
      description: Delete a task permanently
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      responses:
        '204':
          description: Task deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{task_id}/close:
    post:
      summary: Close task
      description: Complete a task (or reschedule if recurring)
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      responses:
        '204':
          description: Task closed
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{task_id}/reopen:
    post:
      summary: Reopen task
      description: Uncomplete a completed task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      responses:
        '200':
          description: Task reopened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{task_id}/move:
    post:
      summary: Move task
      description: Move a task to a different project, section, or parent
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskRequest'
      responses:
        '200':
          description: Task moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  # Projects
  /api/projects:
    get:
      summary: Get projects
      description: Get all active projects
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Paginated projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjects'

    post:
      summary: Create project
      description: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/projects/archived:
    get:
      summary: Get archived projects
      description: Get all archived projects
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Archived projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjects'

  /api/projects/{project_id}:
    get:
      summary: Get project
      description: Get a single project by ID
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Update project
      description: Update an existing project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete project
      description: Delete a project permanently
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '204':
          description: Project deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/projects/{project_id}/archive:
    post:
      summary: Archive project
      description: Archive a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '200':
          description: Project archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/projects/{project_id}/unarchive:
    post:
      summary: Unarchive project
      description: Restore an archived project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '200':
          description: Project unarchived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/projects/{project_id}/collaborators:
    get:
      summary: Get project collaborators
      description: Get all collaborators for a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project ID
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: public_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Project collaborators
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        email:
                          type: string
                  next_cursor:
                    type: string

  # Comments
  /api/comments:
    get:
      summary: Get comments
      description: Get comments for a task or project
      parameters:
        - name: task_id
          in: query
          schema:
            type: string
          description: Filter by task ID
        - name: project_id
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: public_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedComments'

    post:
      summary: Create comment
      description: Create a new comment on a task or project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/comments/{comment_id}:
    get:
      summary: Get comment
      description: Get a single comment by ID
      parameters:
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
          description: Comment ID
      responses:
        '200':
          description: Comment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Update comment
      description: Update an existing comment
      parameters:
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
          description: Comment ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: Updated comment content
              required:
                - content
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete comment
      description: Delete a comment
      parameters:
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
          description: Comment ID
      responses:
        '204':
          description: Comment deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # Sections
  /api/sections:
    get:
      summary: Get sections
      description: Get all sections, optionally filtered by project
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Paginated sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSections'

    post:
      summary: Create section
      description: Create a new section in a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSectionRequest'
      responses:
        '201':
          description: Section created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/sections/{section_id}:
    get:
      summary: Get section
      description: Get a single section by ID
      parameters:
        - name: section_id
          in: path
          required: true
          schema:
            type: string
          description: Section ID
        - name: public_key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Section details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Update section
      description: Update an existing section
      parameters:
        - name: section_id
          in: path
          required: true
          schema:
            type: string
          description: Section ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Updated section name
              required:
                - name
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete section
      description: Delete a section and all its tasks
      parameters:
        - name: section_id
          in: path
          required: true
          schema:
            type: string
          description: Section ID
      responses:
        '204':
          description: Section deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # Labels
  /api/labels:
    get:
      summary: Get labels
      description: Get all user labels
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Paginated labels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLabels'

    post:
      summary: Create label
      description: Create a new personal label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Label name
                color:
                  type: string
                  description: Label color
                order:
                  type: integer
                  description: Label order
                is_favorite:
                  type: boolean
                  description: Whether label is favorite
              required:
                - name
      responses:
        '201':
          description: Label created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/labels/{label_id}:
    get:
      summary: Get label
      description: Get a single label by ID
      parameters:
        - name: label_id
          in: path
          required: true
          schema:
            type: string
          description: Label ID
      responses:
        '200':
          description: Label details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Update label
      description: Update an existing label
      parameters:
        - name: label_id
          in: path
          required: true
          schema:
            type: string
          description: Label ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Updated label name
                color:
                  type: string
                  description: Updated label color
                order:
                  type: integer
                  description: Updated label order
                is_favorite:
                  type: boolean
                  description: Whether label is favorite
      responses:
        '200':
          description: Label updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete label
      description: Delete a personal label
      parameters:
        - name: label_id
          in: path
          required: true
          schema:
            type: string
          description: Label ID
      responses:
        '204':
          description: Label deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/labels/shared:
    get:
      summary: Get shared labels
      description: Get all shared labels used in tasks
      parameters:
        - name: omit_personal
          in: query
          schema:
            type: boolean
            default: false
          description: Whether to omit personal labels
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Shared labels
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: string
                  next_cursor:
                    type: string

    post:
      summary: Rename shared label
      description: Rename a shared label across all tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Current label name
                new_name:
                  type: string
                  description: New label name
              required:
                - name
                - new_name
      responses:
        '200':
          description: Label renamed

  # Activity Log
  /api/activities:
    get:
      summary: Get activity log
      description: Get activity events with optional filtering
      parameters:
        - name: object_type
          in: query
          schema:
            type: string
            enum: [project, item, note]
          description: Filter by object type
        - name: object_id
          in: query
          schema:
            type: string
          description: Filter by specific object ID
        - name: parent_project_id
          in: query
          schema:
            type: string
          description: Filter by parent project ID
        - name: parent_item_id
          in: query
          schema:
            type: string
          description: Filter by parent item ID
        - name: initiator_id
          in: query
          schema:
            type: string
          description: Filter by user who initiated the event
        - name: initiator_id_null
          in: query
          schema:
            type: boolean
          description: Filter by whether event has an initiator
        - name: event_type
          in: query
          schema:
            type: string
            enum: [added, deleted, updated, completed, uncompleted, archived, unarchived, shared, left, reordered, moved]
          description: Filter by event type
        - name: object_event_types
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by object and event type combinations
        - name: annotate_notes
          in: query
          schema:
            type: boolean
            default: false
          description: Include note content in results
        - name: annotate_parents
          in: query
          schema:
            type: boolean
            default: false
          description: Include parent object details
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of events per page
      responses:
        '200':
          description: Activity events
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityEvent'
                  next_cursor:
                    type: string

  # Productivity Stats
  /api/tasks/completed/stats:
    get:
      summary: Get productivity stats
      description: Get comprehensive productivity statistics
      responses:
        '200':
          description: Productivity statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductivityStats'

  # Uploads
  /api/uploads:
    post:
      summary: Upload file
      description: Upload a file for use in comments or tasks
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload
                project_id:
                  type: string
                  description: Optional project ID for workspace limits
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # Templates
  /api/templates/file:
    get:
      summary: Export project as CSV
      description: Export a project as a CSV template file
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
          description: Project ID to export
        - name: use_relative_dates
          in: query
          schema:
            type: boolean
            default: true
          description: Whether to use relative dates
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  /api/templates/url:
    get:
      summary: Export project as URL
      description: Get a shareable URL for a project template
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
          description: Project ID to export
        - name: use_relative_dates
          in: query
          schema:
            type: boolean
            default: true
          description: Whether to use relative dates
      responses:
        '200':
          description: Template URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_name:
                    type: string
                  file_url:
                    type: string

